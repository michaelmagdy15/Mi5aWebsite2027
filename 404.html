<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Michael Mitry</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GH Pages serves a 404 for /works or /about,
      // this page grabs the path and redirects to index.html
      // with the path encoded in the URL query so React Router picks it up.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
