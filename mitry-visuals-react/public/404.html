<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Michael Mitry</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GH Pages serves a 404 for /works/alpha-calisthenics etc,
      // this page encodes the full path into ?p= and redirects to root index.html.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
